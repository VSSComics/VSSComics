backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://YOUR-SITE-NAME.netlify.app

collections:
  - name: "comics"
    label: "Comics"
    files:
      - name: "series"
        label: "All Series"
        file: "content/series.json"
        fields:
          - label: "Series"
            name: "series"
            widget: "list"
            summary: "{{title}}"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "text", required: false}
              - {label: "Cover image", name: "cover", widget: "image", required: false}
              - {label: "Tags", name: "tags", widget: "list", required: false}
              - {label: "Coming soon (locked, hides chapters)", name: "locked", widget: "boolean", default: false}
              - label: "Chapters"
                name: "chapters"
                widget: "list"
                required: false
                summary: "{{fields.num}} — {{fields.title}}"
                fields:
                  - {label: "Chapter number", name: "num", widget: "number", value_type: "int"}
                  - {label: "Chapter title", name: "title", widget: "string"}
                  - label: "Pages (in reading order)"
                    name: "pages"
                    widget: "list"
                    field: {label: "Page image", name: "image", widget: "image"}
